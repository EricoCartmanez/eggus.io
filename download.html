<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download Eggus - discover and connect with people nearby using Bluetooth.">
    <title>Download Eggus</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-deep: #080e18;
            --navy-mid: #0d1b2a;
            --silver: #c0c7cf;
            --silver-bright: #e8ecf0;
            --silver-dim: #6b7a8d;
            --accent: #4a7fb5;
            --accent-glow: rgba(74, 127, 181, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--silver);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(13, 27, 42, 0.9) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(30, 58, 95, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 60%, rgba(20, 40, 70, 0.15) 0%, transparent 60%);
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 40px rgba(74, 127, 181, 0.15));
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #f0f2f5 0%, #c0c7cf 35%, #8a95a3 60%, #c0c7cf 80%, #e8ecf0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1rem;
            color: var(--silver-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .redirecting {
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 260px;
            padding: 16px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .btn-ios {
            background: linear-gradient(135deg, #333 0%, #1a1a1a 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-android {
            background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-icon {
            font-size: 1.3rem;
        }

        .hint {
            font-size: 0.85rem;
            color: var(--silver-dim);
            line-height: 1.5;
            max-width: 280px;
            margin: 0 auto;
        }

        .hint strong {
            color: var(--silver-bright);
        }

        .or-text {
            font-size: 0.8rem;
            color: var(--silver-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        footer {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            text-align: center;
        }

        footer a {
            color: var(--silver-dim);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--silver-bright);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <img src="logo.png" alt="Eggus" class="logo">
        <h1>Eggus</h1>
        <p class="tagline">Get out of your shell</p>

        <p class="redirecting" id="redirect-msg"></p>

        <div class="buttons">
            <a href="https://testflight.apple.com/join/zAnxyfVb" class="btn btn-ios">
                <span class="btn-icon">&#63743;</span> Download for iOS
            </a>
            <p class="hint visible">Since Eggus is still in beta, it will be provided via Apple's <strong>TestFlight</strong>. Install it by tapping on this button and Eggus will be available in there.</p>
            <span class="or-text">or</span>
            <a href="https://play.google.com/store/apps/details?id=io.eggus.app" class="btn btn-android">
                <span class="btn-icon">&#9654;</span> Download for Android
            </a>
        </div>
    </div>

    <footer>
        <a href="/">eggus.io</a>
    </footer>

    <script>
        (function() {
            var ua = navigator.userAgent;
            var msg = document.getElementById('redirect-msg');

            if (/Android/i.test(ua)) {
                msg.textContent = 'Redirecting to Google Play\u2026';
                setTimeout(function() {
                    window.location.href = 'https://play.google.com/store/apps/details?id=io.eggus.app';
                }, 1500);
            }
        })();

    </script>
</body>
</html>
